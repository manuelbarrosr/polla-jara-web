<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pronósticos del partido — Polla Mundialera - CD Hugo Jara</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
<style>
  .crumb{font-size:.85rem;margin:18px 0 6px}
  .crumb a{color:var(--field);font-weight:600;text-decoration:none}
  .head{background:linear-gradient(135deg,var(--field) 0%,var(--field-deep) 100%);color:#EAF3EE;
        border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:6px}
  .head .when{font-size:.74rem;color:#A9D2BF;font-weight:600;margin-bottom:8px}
  .head .vs{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .head .vs .t{font-weight:600;font-size:1.1rem;flex:1;min-width:0;display:flex;align-items:center;gap:8px}
  .head .vs .t.r{justify-content:flex-end;text-align:right}
  .head .vs .sc{font-family:var(--score);font-size:2.4rem;line-height:.8;padding:0 6px}
  .head .vs .sc.tbd{font-size:1.1rem;color:#A9D2BF;font-family:var(--font);font-weight:600}

  .notice{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
          text-align:center;padding:46px 24px;color:var(--muted);margin-top:14px}
  .notice b{display:block;color:var(--ink);font-size:1.05rem;font-weight:600;margin-bottom:6px}

  /* tarjeta de estadísticas: frecuencia de resultados pronosticados */
  .stats-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
              padding:11px 14px;margin-bottom:6px}
  .stats-h{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
  .stat-row{display:grid;grid-template-columns:34px 1fr 22px;align-items:center;gap:9px;margin-bottom:4px}
  .stat-row:last-child{margin-bottom:0}
  .stat-k{font-family:var(--score);font-size:.95rem;letter-spacing:.03em;text-align:center;color:var(--ink);line-height:1}
  .stat-bar{background:#F1EEE2;border-radius:5px;height:11px;overflow:hidden}
  .stat-fill{display:block;height:100%;min-width:3px;background:var(--gold);border-radius:5px}
  .stat-c{font-family:var(--score);font-size:.95rem;text-align:right;color:var(--muted);line-height:1}
  .stat-row.real .stat-fill{background:var(--coral)}
  .stat-row.real .stat-k{color:var(--coral)}

  /* tabla compacta de pronósticos */
  .ptable{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .ptable .ph{padding:8px 14px;background:var(--field-deep);color:#CFE5D9;font-size:.68rem;font-weight:600;
              letter-spacing:.08em;text-transform:uppercase;display:grid;gap:10px;align-items:center}
  .prow{display:grid;gap:10px;align-items:center;padding:9px 14px;border-top:1px solid var(--line)}
  .prow .nm{font-weight:500;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .prow .gs{font-family:var(--score);font-size:1.25rem;letter-spacing:.04em;text-align:center}
  .prow .pt{font-family:var(--score);font-size:1.15rem;min-width:30px;text-align:center;
            background:#F3F6F2;border-radius:7px;padding:1px 7px}
  .prow .pt.z{color:var(--muted)}
  .ph .c{text-align:center}
  .rowchips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .rowchips .bchip{font-size:.64rem;padding:2px 7px}
  .psearch{width:100%;max-width:320px;padding:9px 13px;border:1px solid var(--line);border-radius:99px;
           font-family:var(--font);font-size:.9rem;background:var(--card);margin:0 0 10px}
  .psearch:focus{outline:none;border-color:var(--field);box-shadow:0 0 0 3px rgba(14,110,78,.15)}
  .pempty{padding:18px 14px;text-align:center;color:var(--muted);font-size:.86rem;border-top:1px solid var(--line)}
  .bchips{grid-column:1 / -1;display:flex;flex-wrap:wrap;gap:6px}
  .bchip{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:500;color:var(--ink);
         background:#F3F6F2;border:1px solid var(--line);border-radius:99px;padding:3px 9px}
  .bchip::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .bchip.c-unica::before{background:var(--coral)}
  .bchip.c-exacto::before{background:var(--field)}
  .bchip.c-tend::before{background:#3E8E72}
  .bchip.c-gol::before{background:#9FBDAF}
  .bchip.c-zero{color:var(--muted)}
  .bchip.c-zero::before{background:#CBD3C9}
  .countlbl{font-size:.82rem;color:var(--muted);margin:16px 0 10px}
</style>
</head>
<body>
<header class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html"><img class="hjlogo" src="hj.png" alt=""><b>Polla Mundialera<br>CD Hugo Jara</b></a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="burger" aria-label="Abrir menú"><span></span><span></span><span></span></label>
    <nav>
      <span class="nav-predicciones" id="nav-predicciones"><a href="index.html#tickets">Mis Tickets</a></span>
      <a href="llave.html">Partidos</a>
      <a href="tabla.html">Tabla general</a>
      <span class="nav-sep" aria-hidden="true"></span>
      <a href="reglas.html">Reglas y puntajes</a>
    </nav>
    <div class="who" id="who"></div>
  </div>
</header>

<div class="wrap">
  <p class="crumb"><a href="llave.html">← Partidos</a></p>
  <div id="content"><div class="notice">Cargando…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const MATCH_ID = params.get('match');

function fmtWhen(iso){
  return new Date(iso).toLocaleString('es-CL',{timeZone:'America/Santiago',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

async function init(){
  const auth = await requireProfile();
  if(!auth) return;
  paintTopbar(auth.profile);

  if(!MATCH_ID){ document.getElementById('content').innerHTML = '<div class="notice">Falta el partido.</div>'; return; }

  const { data: m } = await sb.from('matches').select('*').eq('id', MATCH_ID).maybeSingle();
  if(!m){ document.getElementById('content').innerHTML = '<div class="notice">No se encontró el partido.</div>'; return; }

  const started = new Date(m.kickoff).getTime() <= Date.now() || m.status==='IN_PLAY' || m.status==='FINISHED';
  const finished = m.status==='FINISHED' && m.home_score!=null;

  // banderas
  const { data: ts } = await sb.from('teams').select('name,crest');
  const flags = Object.fromEntries((ts||[]).map(t=>[t.name, t.crest]));
  const hf = m.home_team && flags[m.home_team] ? `<img class="flag" src="${flags[m.home_team]}" alt="">` : '';
  const af = m.away_team && flags[m.away_team] ? `<img class="flag" src="${flags[m.away_team]}" alt="">` : '';

  // cabecera del partido
  const scoreHtml = finished
    ? `<span class="sc">${m.home_score}</span><span class="sc">${m.away_score}</span>`
    : `<span class="sc tbd">${m.status==='IN_PLAY'?'en juego':'vs'}</span>`;
  const head = `
    <div class="head">
      <div class="when">${fmtWhen(m.kickoff)} hs</div>
      <div class="vs">
        <span class="t">${hf}${escapeHtml(m.home_team||'Por definir')}</span>
        ${scoreHtml}
        <span class="t r">${escapeHtml(m.away_team||'Por definir')}${af}</span>
      </div>
    </div>`;

  if(!started){
    document.getElementById('content').innerHTML = head +
      `<div class="notice"><b>Todavía no</b>No es posible ver las predicciones del resto antes del partido.</div>`;
    return;
  }

  // config (valores de puntaje, por si calculamos puntos)
  const { data: cfg } = await sb.from('config').select('key,value');
  const C = Object.fromEntries((cfg||[]).map(c=>[c.key,c.value]));
  const P = { unique:C.pts_unique??9, exact:C.pts_exact??5, tend:C.pts_tendencia??2, gol:C.pts_gol??1 };

  // pronósticos de todos para este partido
  const { data: preds, error } = await sb
    .from('predictions')
    .select('home_pred,away_pred,entries(nombre,profiles(display_name))')
    .eq('match_id', MATCH_ID);

  if(error){ document.getElementById('content').innerHTML = head + '<div class="notice">No se pudieron cargar los pronósticos.</div>'; return; }

  const rows = preds || [];
  // para "única": cuántos pusieron el marcador real exacto
  let nExact = 0;
  if(finished) nExact = rows.filter(r=>r.home_pred===m.home_score && r.away_pred===m.away_score).length;

  function pts(r){
    if(!finished) return null;
    const ph=r.home_pred, pa=r.away_pred, hs=m.home_score, as=m.away_score;
    if(ph===hs && pa===as) return nExact===1 ? P.unique : P.exact;
    let p=0;
    if(Math.sign(ph-pa)===Math.sign(hs-as)) p+=P.tend;
    if(ph===hs || pa===as) p+=P.gol;
    return p;
  }

  // Desglose: cómo obtuvo sus puntos (chips, igual que la tabla general)
  function breakdown(r){
    const ph=r.home_pred, pa=r.away_pred, hs=m.home_score, as=m.away_score;
    if(ph===hs && pa===as){
      return nExact===1
        ? '<span class="bchip c-unica">Única</span>'
        : '<span class="bchip c-exacto">Exacto</span>';
    }
    const chips=[];
    if(Math.sign(ph-pa)===Math.sign(hs-as)) chips.push('<span class="bchip c-tend">Tendencia</span>');
    if(ph===hs || pa===as) chips.push('<span class="bchip c-gol">Gol</span>');
    return chips.length ? chips.join('') : '<span class="bchip c-zero">Sin acierto</span>';
  }

  // --- Tarjeta de estadísticas: frecuencia de cada resultado pronosticado ---
  const freq = {};
  rows.forEach(r=>{ const k = r.home_pred+'-'+r.away_pred; freq[k] = (freq[k]||0)+1; });
  const fEntries = Object.entries(freq).sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]));
  const maxC = fEntries.length ? fEntries[0][1] : 0;
  const realKey = finished ? (m.home_score+'-'+m.away_score) : null;
  const statsCard = rows.length ? `
    <div class="stats-card">
      <div class="stats-h">Resultados más pronosticados</div>
      ${fEntries.map(([k,c])=>`
        <div class="stat-row ${k===realKey?'real':''}">
          <span class="stat-k">${k}</span>
          <span class="stat-bar"><span class="stat-fill" style="width:${maxC?Math.round(c/maxC*100):0}%"></span></span>
          <span class="stat-c">${c}</span>
        </div>`).join('')}
    </div>` : '';

  // --- Tabla compacta de pronósticos ---
  rows.sort((a,b)=> finished ? (pts(b)-pts(a)) :
    (((a.entries?.nombre)||'').localeCompare((b.entries?.nombre)||'')));

  const gtc = finished ? 'grid-template-columns:1fr auto auto' : 'grid-template-columns:1fr auto';
  const header = `<div class="ph" style="${gtc}"><span>Jugador</span><span class="c">Pron.</span>${finished?'<span class="c">Pts</span>':''}</div>`;
  const body = rows.map(r=>{
    const nombre = r.entries?.nombre || '—';
    const p = pts(r);
    const sub = finished ? `<div class="rowchips">${breakdown(r)}</div>` : '';
    const ptHtml = finished ? `<span class="pt ${p===0?'z':''}">${p}</span>` : '';
    return `<div class="prow" data-n="${escapeHtml(nombre)}" style="${gtc}">
      <div class="nm">${escapeHtml(nombre)}${sub}</div>
      <div class="gs">${r.home_pred}-${r.away_pred}</div>
      ${ptHtml}
    </div>`;
  }).join('');
  const table = `<div class="ptable">${header}${body}<div class="pempty" id="p-empty" style="display:none">Sin coincidencias.</div></div>`;
  const searchBox = rows.length ? '<input class="psearch" id="psearch" type="text" placeholder="Buscar jugador…" autocomplete="off">' : '';

  document.getElementById('content').innerHTML = head + statsCard +
    `<p class="countlbl">${rows.length} pronóstico${rows.length===1?'':'s'}${finished?' · ordenados por puntos':''}</p>` +
    searchBox +
    (rows.length ? table : '<div class="notice">Nadie pronosticó este partido.</div>');

  // Filtro del buscador (sin acentos, en vivo)
  const search = document.getElementById('psearch');
  if(search){
    const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    search.addEventListener('input', ()=>{
      const q = norm(search.value.trim());
      let visibles = 0;
      document.querySelectorAll('.ptable .prow').forEach(row=>{
        const ok = !q || norm(row.dataset.n).includes(q);
        row.style.display = ok ? '' : 'none';
        if(ok) visibles++;
      });
      const empty = document.getElementById('p-empty');
      if(empty) empty.style.display = visibles ? 'none' : '';
    });
  }
}

init();
</script>
</body>
</html>
