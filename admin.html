<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Administración — Polla Mundialera - CD Hugo Jara</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
<style>
  .search{width:100%;max-width:360px;padding:11px 14px;border:1px solid var(--line);border-radius:99px;
          font-family:var(--font);font-size:.92rem;background:var(--card);margin-bottom:14px}
  .search:focus{outline:none;border-color:var(--field);box-shadow:0 0 0 3px rgba(14,110,78,.15)}
  .savemsg{font-size:.78rem;font-weight:700;margin:0 0 12px;min-height:1.1em;color:var(--ok)}
  .adm-head{display:grid;grid-template-columns:1fr 84px 96px;gap:12px;padding:0 15px 6px;
            font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .adm-head .c{text-align:center} .adm-head .r{text-align:right}
  .adm-row{display:grid;grid-template-columns:1fr 84px 96px;gap:12px;align-items:center;
           background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
           padding:10px 15px;margin-bottom:8px}
  .adm-row.is-paid{border-color:#BFE0CD;box-shadow:inset 3px 0 0 var(--ok),var(--shadow)}
  .adm-row .nm{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .adm-row .em{color:var(--muted);font-size:.76rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .adm-row .tk input{width:100%;height:38px;text-align:center;border:1px solid var(--line);border-radius:8px;
                     font-family:var(--score);font-size:1.2rem;background:#FAFBFA;color:var(--ink);
                     -moz-appearance:textfield;appearance:textfield}
  .adm-row .tk input::-webkit-outer-spin-button,.adm-row .tk input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .adm-row .pg{display:flex;align-items:center;justify-content:flex-end;gap:7px;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--muted)}
  .adm-row .pg.on{color:#0C5C3E}
  .adm-row .pg input{width:20px;height:20px;accent-color:var(--field);cursor:pointer;margin:0}
  .loading{text-align:center;color:var(--muted);padding:40px}
  body{padding-bottom:56px}
  @media(max-width:560px){
    .adm-head,.adm-row{grid-template-columns:1fr 60px 70px;gap:8px}
    .adm-row .em{display:none}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html"><img class="hjlogo" src="hj.png" alt=""><b>Polla Mundialera<br>CD Hugo Jara</b></a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="burger" aria-label="Abrir menú"><span></span><span></span><span></span></label>
    <nav>
      <span class="nav-predicciones" id="nav-predicciones"><a href="index.html#tickets">Mis Tickets</a></span>
      <a href="llave.html">Partidos</a>
      <a href="tabla.html">Tabla general</a>
      <span class="nav-sep" aria-hidden="true"></span>
      <a href="reglas.html">Reglas y puntajes</a>
    </nav>
    <div class="who" id="who"></div>
  </div>
</header>

<div class="wrap">
  <section class="section">
    <p class="eyebrow">Administración</p>
    <h1 class="h-sec">Jugadores</h1>
    <input class="search" id="search" type="text" placeholder="Buscar jugador o correo…">
    <p class="savemsg" id="savemsg"></p>
    <div class="adm-head" id="adm-head"><div>Jugador</div><div class="c">Tickets</div><div class="r">Pagó</div></div>
    <div id="list"><div class="loading">Cargando…</div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
let rows = [];

async function init(){
  const auth = await requireProfile();
  if(!auth) return;
  paintTopbar(auth.profile);

  if(!auth.profile.is_admin){
    document.getElementById('search').style.display = 'none';
    document.getElementById('adm-head').style.display = 'none';
    document.getElementById('list').innerHTML = '<div class="loading">No tienes acceso a esta sección.</div>';
    return;
  }

  const { data, error } = await sb.from('profiles')
    .select('id,display_name,email,tickets,pagado')
    .order('display_name');
  if(error){ document.getElementById('list').innerHTML = '<div class="loading">No se pudo cargar la lista: '+error.message+'</div>'; return; }
  rows = data || [];
  render(rows);

  document.getElementById('search').addEventListener('input', e=>{
    const q = e.target.value.trim().toLowerCase();
    render(rows.filter(r =>
      (r.display_name||'').toLowerCase().includes(q) || (r.email||'').toLowerCase().includes(q)));
  });
}

function render(list){
  const box = document.getElementById('list');
  if(!list.length){ box.innerHTML = '<div class="loading">Sin resultados.</div>'; return; }
  box.innerHTML = list.map(r=>`
    <div class="adm-row ${r.pagado?'is-paid':''}" data-id="${r.id}">
      <div class="who-cell">
        <div class="nm">${escapeHtml(r.display_name||'—')}</div>
        <div class="em">${escapeHtml(r.email||'')}</div>
      </div>
      <div class="tk"><input type="number" min="1" value="${r.tickets??1}" data-id="${r.id}" class="tk-input"></div>
      <label class="pg ${r.pagado?'on':''}">
        <input type="checkbox" ${r.pagado?'checked':''} data-id="${r.id}" class="pg-input">
        <span>${r.pagado?'Sí':'No'}</span>
      </label>
    </div>`).join('');

  box.querySelectorAll('.tk-input').forEach(el=>{
    el.addEventListener('change', async ()=>{
      const n = Math.max(1, parseInt(el.value,10)||1);
      el.value = n;
      await save(el.dataset.id, { tickets: n });
    });
  });
  box.querySelectorAll('.pg-input').forEach(el=>{
    el.addEventListener('change', async ()=>{
      const val = el.checked;
      const ok = await save(el.dataset.id, { pagado: val });
      if(!ok){ el.checked = !val; return; }      // revertir si falló
      const row = el.closest('.adm-row'); row.classList.toggle('is-paid', val);
      const lbl = el.closest('.pg'); lbl.classList.toggle('on', val);
      lbl.querySelector('span').textContent = val ? 'Sí' : 'No';
    });
  });
}

async function save(id, patch){
  const msg = document.getElementById('savemsg');
  const { error } = await sb.from('profiles').update(patch).eq('id', id);
  if(error){ msg.style.color = '#B23A23'; msg.textContent = '⚠ No se pudo guardar: ' + error.message; return false; }
  const obj = rows.find(x=>x.id===id); if(obj) Object.assign(obj, patch);
  msg.style.color = 'var(--ok)'; msg.textContent = '✓ Guardado';
  setTimeout(()=>{ if(msg.textContent==='✓ Guardado') msg.textContent=''; }, 1500);
  return true;
}

init();
</script>
</body>
</html>
